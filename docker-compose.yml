services:

  mysql:
    image: mysql:8.0
    container_name: todo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    container_name: todo_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      LOG_DIR: /app/logs
    volumes:
      - ./logs/backend:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  backend2:
    build:
      context: ./backend
    container_name: todo_backend2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      LOG_DIR: /app/logs
    volumes:
      - ./logs/backend2:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: todo_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: todo_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - backend2
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
