events {
    worker_connections 1024;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting zones (shared memory for tracking client IPs)
    # api_limit: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # login_limit: 5 requests per minute per IP (stricter for auth)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    limit_req_status 429;

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        least_conn;
        server backend:8000;
        server backend2:8000;
    }

    server {

        listen 80;

        server_name _;

        location / {

            proxy_pass http://frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Stricter rate limit for login (brute-force protection)
        location = /api/login {
            limit_req zone=login_limit burst=3 nodelay;

            proxy_pass http://backend/login;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/register {
            limit_req zone=login_limit burst=3 nodelay;

            proxy_pass http://backend/register;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
